<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator - Se'adet-i Ebediyye</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      margin: 0;
    }
    h1 { color: #d4a843; margin-bottom: 0.5rem; }
    .controls {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls label { display: flex; flex-direction: column; gap: 0.3rem; }
    .controls input, .controls select {
      padding: 0.5rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #eee;
      font-size: 0.95rem;
    }
    .controls input[type="text"] { width: 400px; }
    button {
      padding: 0.7rem 1.5rem;
      background: #0e4a35;
      color: #d4a843;
      border: 2px solid #d4a843;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #1a6b4e; }
    canvas {
      border: 1px solid #333;
      border-radius: 8px;
      margin-top: 1rem;
      max-width: 100%;
      height: auto;
    }
    .output {
      margin-top: 1rem;
      text-align: center;
    }
    .output a {
      color: #d4a843;
      text-decoration: underline;
    }
    #preview-img {
      max-width: 600px;
      border-radius: 8px;
      border: 1px solid #333;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<h1>OG Image Generator</h1>
<p>Se'adet-i Ebediyye - Paylasilabilir gorsel olusturucu</p>

<div class="controls">
  <label>
    Madde Basligi
    <input type="text" id="title-input" value="Mubarek Geceler" placeholder="Madde basligini girin">
  </label>
  <label>
    Kisim
    <select id="kisim-input">
      <option value="1">1. Kisim</option>
      <option value="2">2. Kisim</option>
      <option value="3">3. Kisim</option>
    </select>
  </label>
  <label>
    Madde No
    <input type="number" id="madde-input" value="85" min="1" max="200" style="width:80px">
  </label>
</div>

<button onclick="renderPreview()">Gorsel Olustur</button>
<button onclick="downloadImage()">Indir (PNG)</button>

<canvas id="og-canvas" width="1200" height="630" style="display:none"></canvas>

<div class="output">
  <img id="preview-img" alt="OG Image onizleme">
</div>

<script>
/**
 * Generate an OG image for a given madde.
 * @param {string} title - Madde title
 * @param {number} kisim - Kisim number (1, 2, or 3)
 * @param {number} maddeNo - Madde number
 * @returns {string} data URL of the generated image (PNG)
 */
function generateOgImage(title, kisim, maddeNo) {
  const canvas = document.getElementById('og-canvas') || document.createElement('canvas');
  canvas.width = 1200;
  canvas.height = 630;
  const ctx = canvas.getContext('2d');

  // === Background gradient ===
  const bgGrad = ctx.createLinearGradient(0, 0, 1200, 630);
  bgGrad.addColorStop(0, '#0e4a35');
  bgGrad.addColorStop(0.5, '#145a40');
  bgGrad.addColorStop(1, '#1a6b4e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 1200, 630);

  // === Subtle geometric pattern (Islamic-inspired) ===
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#d4a843';
  ctx.lineWidth = 1;
  for (let x = 0; x < 1200; x += 60) {
    for (let y = 0; y < 630; y += 60) {
      ctx.beginPath();
      ctx.arc(x, y, 20, 0, Math.PI * 2);
      ctx.stroke();
      // Small diamond
      ctx.beginPath();
      ctx.moveTo(x, y - 10);
      ctx.lineTo(x + 10, y);
      ctx.lineTo(x, y + 10);
      ctx.lineTo(x - 10, y);
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();

  // === Top gold decorative line ===
  const goldGrad = ctx.createLinearGradient(200, 0, 1000, 0);
  goldGrad.addColorStop(0, 'rgba(212, 168, 67, 0)');
  goldGrad.addColorStop(0.2, 'rgba(212, 168, 67, 1)');
  goldGrad.addColorStop(0.5, 'rgba(240, 200, 100, 1)');
  goldGrad.addColorStop(0.8, 'rgba(212, 168, 67, 1)');
  goldGrad.addColorStop(1, 'rgba(212, 168, 67, 0)');

  ctx.fillStyle = goldGrad;
  ctx.fillRect(100, 40, 1000, 3);

  // Decorative diamond at center of line
  ctx.save();
  ctx.fillStyle = '#d4a843';
  ctx.translate(600, 41);
  ctx.rotate(Math.PI / 4);
  ctx.fillRect(-6, -6, 12, 12);
  ctx.restore();

  // Small diamonds at ends
  ctx.save();
  ctx.fillStyle = '#d4a843';
  ctx.translate(200, 41);
  ctx.rotate(Math.PI / 4);
  ctx.fillRect(-4, -4, 8, 8);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#d4a843';
  ctx.translate(1000, 41);
  ctx.rotate(Math.PI / 4);
  ctx.fillRect(-4, -4, 8, 8);
  ctx.restore();

  // === Book title: Se'adet-i Ebediyye ===
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Glow effect
  ctx.save();
  ctx.shadowColor = 'rgba(212, 168, 67, 0.3)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ffffff';
  ctx.font = '600 36px "Georgia", "Times New Roman", serif';
  ctx.fillText("Se'\u00e2det-i Ebediyye", 600, 110);
  ctx.restore();

  // Thin separator
  ctx.fillStyle = 'rgba(212, 168, 67, 0.4)';
  ctx.fillRect(400, 145, 400, 1);

  // === Madde title (main content) ===
  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 2;

  // Auto-size font based on title length
  let fontSize = 52;
  if (title.length > 60) fontSize = 36;
  else if (title.length > 45) fontSize = 40;
  else if (title.length > 30) fontSize = 44;

  ctx.fillStyle = '#d4a843';
  ctx.font = 'bold ' + fontSize + 'px "Georgia", "Times New Roman", serif';

  // Word wrap
  const maxWidth = 1000;
  const lineHeight = fontSize * 1.35;
  const words = title.split(' ');
  let lines = [];
  let currentLine = words[0] || '';

  for (let i = 1; i < words.length; i++) {
    const testLine = currentLine + ' ' + words[i];
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth) {
      lines.push(currentLine);
      currentLine = words[i];
    } else {
      currentLine = testLine;
    }
  }
  lines.push(currentLine);

  // Center vertically in the main area (170 - 470)
  const totalTextHeight = lines.length * lineHeight;
  const startY = 320 - (totalTextHeight / 2) + (lineHeight / 2);

  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], 600, startY + i * lineHeight);
  }
  ctx.restore();

  // === Subtitle: Kisim X, Madde Y ===
  ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
  ctx.font = '24px "Georgia", "Times New Roman", serif';
  ctx.fillText('K\u0131s\u0131m ' + kisim + ', Madde ' + maddeNo, 600, 480);

  // === Bottom gold decorative line ===
  ctx.fillStyle = goldGrad;
  ctx.fillRect(100, 530, 1000, 2);

  // === Watermark: ilmihal.org ===
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.font = '20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  ctx.fillText('ilmihal.org', 600, 575);

  // === Small crescent icon near watermark ===
  ctx.save();
  ctx.fillStyle = 'rgba(212, 168, 67, 0.4)';
  ctx.beginPath();
  ctx.arc(535, 575, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0e4a35';
  ctx.beginPath();
  ctx.arc(540, 575, 10, 0, Math.PI * 2);
  ctx.fill();
  // Restore the crescent's visible part
  ctx.fillStyle = 'rgba(212, 168, 67, 0.4)';
  ctx.beginPath();
  ctx.arc(535, 575, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(541, 575, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  return canvas.toDataURL('image/png');
}

function renderPreview() {
  const title = document.getElementById('title-input').value;
  const kisim = parseInt(document.getElementById('kisim-input').value);
  const maddeNo = parseInt(document.getElementById('madde-input').value);

  const dataUrl = generateOgImage(title, kisim, maddeNo);
  document.getElementById('preview-img').src = dataUrl;
}

function downloadImage() {
  const title = document.getElementById('title-input').value;
  const kisim = parseInt(document.getElementById('kisim-input').value);
  const maddeNo = parseInt(document.getElementById('madde-input').value);

  const dataUrl = generateOgImage(title, kisim, maddeNo);

  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = 'seadet-k' + kisim + '-m' + maddeNo + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Generate on load
window.addEventListener('DOMContentLoaded', renderPreview);
</script>

</body>
</html>
